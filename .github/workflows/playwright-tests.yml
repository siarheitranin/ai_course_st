name: Playwright Tests

on:
  pull_request:
    branches:
      - main
  # Required so the Pages deploy job runs after merges to main
  push:
    branches:
      - main

# Cancel any in-progress run for the same PR to avoid redundant work;
# push runs on main are not cancelled (cancel-in-progress: false equivalent
# is achieved by scoping the group to event name)
concurrency:
  group: playwright-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default minimal permissions; individual jobs override where needed
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # All run steps execute inside the project subdirectory
    defaults:
      run:
        working-directory: ai.test.maintenance

    steps:
      # Checkout the repository at the PR head commit
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with npm dependency caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ai.test.maintenance/package-lock.json

      # Install project dependencies from the frozen lockfile
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers along with required OS-level dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Execute the full Playwright test suite; playwright.config.ts workers: 3 drives parallelism
      - name: Run Playwright tests
        run: npx playwright test

      # Upload the HTML report so it can be downloaded and reviewed after the run
      # Artifact paths are relative to the workspace root, not working-directory
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: ai.test.maintenance/playwright-report/
          retention-days: 14

      # Upload trace archives for failed tests to aid post-mortem debugging
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: ai.test.maintenance/test-results/**/trace*.zip
          retention-days: 14

      # Notify Microsoft Teams when any previous step in the job has failed
      - name: Notify Teams on failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BRANCH: ${{ github.head_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL secret not configured — skipping notification."
            exit 0
          fi
          jq -n \
            --arg title  "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg branch "$BRANCH" \
            --arg url    "$RUN_URL" \
            '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Playwright Tests Failed",
              "themeColor": "FF0000",
              "title": "Playwright Tests Failed",
              "sections": [{
                "facts": [
                  {"name": "PR Title", "value": $title},
                  {"name": "Author",   "value": $author},
                  {"name": "Branch",   "value": $branch}
                ]
              }],
              "potentialAction": [{
                "@type": "OpenUri",
                "name": "View Failed Run",
                "targets": [{"os": "default", "uri": $url}]
              }]
            }' \
          | curl -s -X POST "$TEAMS_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @- || echo "Teams notification failed — continuing."

      # Fetch previous run history from gh-pages branch (if any) and append the
      # current run record; jq -s slurps both files so the append is safe JSON
      - name: Prepare history.json
        if: always() && github.ref == 'refs/heads/main'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          CONCLUSION: ${{ job.status }}
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          git show origin/gh-pages:history.json > /tmp/prev-history.json 2>/dev/null \
            || echo '[]' > /tmp/prev-history.json

          jq -n \
            --arg ts         "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_url    "$RUN_URL" \
            --arg sha        "$SHA" \
            --arg ref        "$REF" \
            --arg conclusion "$CONCLUSION" \
            '{timestamp: $ts, run_url: $run_url, sha: $sha, ref: $ref, conclusion: $conclusion}' \
            > /tmp/new-entry.json

          jq -s '.[0] + [.[1]]' /tmp/prev-history.json /tmp/new-entry.json \
            > playwright-report/history.json

      # Upload playwright-report/ (including history.json) as the Pages site artifact;
      # path is relative to $GITHUB_WORKSPACE — uses: steps ignore working-directory
      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai.test.maintenance/playwright-report/

  # Isolated deploy job so environment: github-pages protection rules only
  # apply here and never block PR runs of playwright-tests
  deploy-pages:
    name: deploy-pages
    needs: playwright-tests
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    continue-on-error: false

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: ai.test.maintenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ai.test.maintenance/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Audit for high and critical vulnerabilities; always write summary before exiting
      - name: Audit dependencies
        run: |
          npm audit --audit-level=high > /tmp/audit-report.txt 2>&1 || AUDIT_EXIT=$?

          echo "## Dependency Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$AUDIT_EXIT" ]; then
            echo "**Result: high or critical vulnerabilities detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Result: no high or critical vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/audit-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          exit ${AUDIT_EXIT:-0}
