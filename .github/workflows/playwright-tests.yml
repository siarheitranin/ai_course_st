name: Playwright Tests

on:
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same PR to avoid redundant work
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal read-only permissions
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true

    steps:
      # Checkout the repository at the PR head commit
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with Yarn dependency caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install project dependencies from the frozen lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers along with required OS-level dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Execute the full Playwright test suite; config workers: 3 drives parallelism
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload the HTML report so it can be downloaded and reviewed after the run
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14

      # Upload trace archives for failed tests to aid post-mortem debugging
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 14
